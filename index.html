<!DOCTYPE html>
<html>
<head>
  <title>Plant Identifier 🌿</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background-color: #f4f4f4;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    img {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 8px;
    }
    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: green;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>🌿 Plant Identifier</h2>

  <input type="file" id="fileInput"><br>
  <img id="preview" />

  <button onclick="upload()">Identify</button>

  <pre id="result"></pre>
</div>

<script>
  const fileInput = document.getElementById("fileInput");
  const preview = document.getElementById("preview");

  fileInput.onchange = () => {
    const file = fileInput.files[0];
    preview.src = URL.createObjectURL(file);
  };

  async function upload() {
    const file = fileInput.files[0];

    if (!file) {
      alert("Please select an image!");
      return;
    }

    const formData = new FormData();
    formData.append("file", file);

    document.getElementById("result").innerText = "Identifying...";

    const response = await fetch("https://plant-app-pritisangwan.onrender.com/identify/", {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    let text = "";
    data.results.forEach(p => {
      text += `🌱 ${p.common} (${p.scientific}) - ${Math.round(p.confidence * 100)}%\n`;
    });

    document.getElementById("result").innerText = text;
  }
</script>

</body>
</html>
